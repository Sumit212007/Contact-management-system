<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Management System</title>
  <link rel="stylesheet" href="frontend.css">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body>

<div class="app">

  <!-- Header -->
  <header>
    <div class="logo">CONT<span>.</span>ACT</div>
    <div class="stats">
      <div class="stat"><div class="stat-num" id="totalCount">0</div><div class="stat-label">Total</div></div>
      <div class="stat"><div class="stat-num" id="workCount">0</div><div class="stat-label">Work</div></div>
      <div class="stat"><div class="stat-num" id="personalCount">0</div><div class="stat-label">Personal</div></div>
    </div>
  </header>

  <div class="layout">

    <!-- Left: Form -->
    <div>
      <div class="panel">
        <div class="panel-header"><div class="dot"></div><span id="formTitle">Add New Contact</span></div>
        <div class="form-body">
          <input type="hidden" id="editId" value="">
          <div class="row2">
            <div class="field">
              <label>First Name *</label>
              <input type="text" id="firstName" placeholder="John"/>
            </div>
            <div class="field">
              <label>Last Name *</label>
              <input type="text" id="lastName" placeholder="Doe"/>
            </div>
          </div>
          <div class="field">
            <label>Email *</label>
            <input type="email" id="email" placeholder="john@example.com"/>
          </div>
          <div class="row2">
            <div class="field">
              <label>Phone</label>
              <input type="tel" id="phone" placeholder="+1 000 000 0000"/>
            </div>
            <div class="field">
              <label>Category</label>
              <select id="category">
                <option value="work">Work</option>
                <option value="personal">Personal</option>
                <option value="family">Family</option>
                <option value="other">Other</option>
              </select>
            </div>
          </div>
          <div class="field">
            <label>Company</label>
            <input type="text" id="company" placeholder="Acme Corp"/>
          </div>
          <div class="field">
            <label>Notes</label>
            <textarea id="notes" placeholder="Any notes…"></textarea>
          </div>
          <div class="btn-row">
            <button class="btn btn-primary" onclick="handleSubmit()">Save Contact</button>
            <button class="btn btn-secondary" onclick="resetForm()">Clear</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Right: Contacts list -->
    <div>
      <div class="panel">
        <div class="panel-header"><div class="dot"></div>Contact List</div>
        <div class="search-wrap">
          <span class="search-icon">⌕</span>
          <input type="text" id="searchBox" placeholder="Search by name, email, company…" oninput="renderContacts()"/>
        </div>
        <div class="contacts-wrap" id="contactList">
          <div class="empty-state"><div class="big">📋</div>No contacts yet.<br/>Add one using the form!</div>
        </div>
      </div>
    </div>

  </div>

</div>
<div id="toast">✓ Saved!</div>

<script src="contact.js"></script>
</body>
</html>
